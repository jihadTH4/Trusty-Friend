<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trusty-Friend | GitHub Pages Demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="bg-blur bg-blur-1"></div>
    <div class="bg-blur bg-blur-2"></div>

    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="chat-card shadow-lg">
            <div class="chat-header d-flex justify-content-between align-items-center">
              <div>
                <h1 class="h4 mb-1">Trusty-Friend</h1>
                <p class="mb-0 text-light-emphasis">GitHub Pages demo (client-only mode)</p>
              </div>
              <span class="badge rounded-pill text-bg-info px-3 py-2">Pages</span>
            </div>

            <div class="alert alert-warning m-3 mb-0" role="alert">
              This GitHub Pages version is static. It stores messages in your browser only and does not provide real-time multi-user chat.
            </div>

            <div id="messages" class="chat-body"></div>

            <form id="chat-form" class="chat-form">
              <div class="row g-2">
                <div class="col-md-3">
                  <input type="text" id="username" class="form-control" placeholder="Your name" maxlength="40" required />
                </div>
                <div class="col-md-7">
                  <input type="text" id="content" class="form-control" placeholder="Write a message..." maxlength="500" required />
                </div>
                <div class="col-md-2 d-grid">
                  <button type="submit" class="btn btn-primary">Send</button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
